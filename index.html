<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>w.</title>
<style>
:root { --paper:#f7f4ee; --ink:#221e18; --muted:#8a8172; --gold:#a8894f; --rule:#ddd3bf; --card:#fffdf9; }
@media (prefers-color-scheme: dark) {
  :root { --paper:#16130e; --ink:#e9e2d3; --muted:#877e6c; --gold:#c8a86a; --rule:#3a3428; --card:#1e1a13; }
}
* { box-sizing:border-box; }
body { margin:0; min-height:100vh; display:grid; place-items:center; background:var(--paper); color:var(--ink);
  font-family:'PingFang SC','Hiragino Sans GB',-apple-system,sans-serif; }
.box { width:min(320px, 86vw); text-align:center; }
.brick { width:56px; height:22px; border-radius:4px; background:var(--gold); margin:0 auto 22px; }
h1 { font-family:'Songti SC','STSong',serif; font-size:22px; letter-spacing:8px; font-weight:600; margin:0 0 24px; }
input { width:100%; padding:12px 14px; font-size:16px; text-align:center; letter-spacing:2px;
  border:1px solid var(--rule); border-radius:10px; background:var(--card); color:var(--ink); font-family:inherit; }
input:focus-visible { outline:2px solid var(--gold); outline-offset:2px; }
button { width:100%; margin-top:12px; padding:12px; font-size:15px; letter-spacing:6px; border:none;
  border-radius:10px; background:var(--ink); color:var(--paper); cursor:pointer; font-family:inherit; }
@media (prefers-color-scheme: dark) { button { background:var(--gold); color:#16130e; } }
label.rem { display:flex; gap:8px; justify-content:center; align-items:center; margin-top:14px; font-size:13px; color:var(--muted); cursor:pointer; }
.err { margin-top:12px; font-size:13px; color:#a8543c; min-height:1.2em; }
</style>
</head>
<body>
<div class="box">
  <div class="brick"></div>

  <form id="f">

    <button type="submit">进 入</button>
    <label class="rem"><input type="checkbox" id="rem" checked style="width:auto">记住本设备</label>
    <div class="err" id="err"></div>
  </form>
</div>

function ub64(s){ var b=atob(s), a=new Uint8Array(b.length); for(var i=0;i<b.length;i++)a[i]=b.charCodeAt(i); return a; }
function b64(buf){ var a=new Uint8Array(buf), s=''; for(var i=0;i<a.length;i++)s+=String.fromCharCode(a[i]); return btoa(s); }
async function keyFromPw(pw){
  var km = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2', salt:ub64(SALT), iterations:250000, hash:'SHA-256'},
    km, {name:'AES-GCM', length:256}, true, ['decrypt']);
}
async function open_(key, remember){
  var pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:ub64(IV)}, key, ub64(CT));
  if (remember) localStorage.setItem('obb-k', b64(await crypto.subtle.exportKey('raw', key)));
  var html = new TextDecoder().decode(pt);
  document.open(); document.write(html); document.close();
}
document.getElementById('f').addEventListener('submit', async function(e){
  e.preventDefault();
  var err = document.getElementById('err'); err.textContent = '';
  try {
    var key = await keyFromPw(document.getElementById('pw').value);
    await open_(key, document.getElementById('rem').checked);
  } catch (ex) { err.textContent = '口令不对。'; }
});
(async function(){
  var saved = localStorage.getItem('obb-k');
  if (!saved) return;
  try {
    var key = await crypto.subtle.importKey('raw', ub64(saved), {name:'AES-GCM'}, true, ['decrypt']);
    await open_(key, false);
  } catch (ex) { localStorage.removeItem('obb-k'); }
})();
